<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Тренировки">
  <meta name="theme-color" content="#121212">
  <title>Мои Тренировки</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    html { overscroll-behavior-y: contain; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#121212] text-white">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        'trending-up': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
        'wallet': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
        'plus-circle': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>,
        'calendar': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>,
        'users': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        'user': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        'trash-2': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
        'download': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
        'upload': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
        'shield': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>,
      };
      return icons[name] || null;
    };

    const STORAGE_KEY = 'training-tracker-entries';
    const CHARITY_KEY = 'training-tracker-charity';
    const GROUP_RATE = 150;
    const PERSONAL_RATE = 600;

    function loadEntries() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    }

    function saveEntries(entries) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
      catch (e) { console.error('Failed to save:', e); }
    }

    function loadCharity() {
      try {
        const data = localStorage.getItem(CHARITY_KEY);
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    }

    function saveCharity(entries) {
      try { localStorage.setItem(CHARITY_KEY, JSON.stringify(entries)); }
      catch (e) { console.error('Failed to save charity:', e); }
    }

    function App() {
      const [entries, setEntries] = useState(loadEntries);
      const [charityEntries, setCharityEntries] = useState(loadCharity);
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [type, setType] = useState('group');
      const [groupCount, setGroupCount] = useState(1);
      const [clientName, setClientName] = useState('');
      const [charityName, setCharityName] = useState('');
      const [charityAmount, setCharityAmount] = useState('');
      const [activeTab, setActiveTab] = useState('history');
      const [expandedMonth, setExpandedMonth] = useState(null);
      const [expandedPerson, setExpandedPerson] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [toast, setToast] = useState(null);
      const fileInputRef = React.useRef(null);

      useEffect(() => {
        if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
      }, []);

      useEffect(() => { saveEntries(entries); }, [entries]);
      useEffect(() => { saveCharity(charityEntries); }, [charityEntries]);

      const showToast = (msg, isError) => {
        setToast({ msg, isError });
        setTimeout(() => setToast(null), 3000);
      };

      const handleExport = () => {
        const data = JSON.stringify({ entries, charity: charityEntries }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `trenirovki-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Данные экспортированы');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const raw = JSON.parse(ev.target.result);
            // Support old format (plain array) and new format ({entries, charity})
            const trainData = Array.isArray(raw) ? raw : (raw.entries || []);
            const charData = Array.isArray(raw) ? [] : (raw.charity || []);
            let imported = 0;
            setEntries(prev => {
              const existingIds = new Set(prev.map(e => e.id));
              const newOnes = trainData.filter(e => e.id && !existingIds.has(e.id));
              imported += newOnes.length;
              if (newOnes.length === 0) return prev;
              return [...newOnes, ...prev];
            });
            setCharityEntries(prev => {
              const existingIds = new Set(prev.map(e => e.id));
              const newOnes = charData.filter(e => e.id && !existingIds.has(e.id));
              imported += newOnes.length;
              if (newOnes.length === 0) return prev;
              return [...newOnes, ...prev];
            });
            showToast(imported > 0 ? `Импортировано ${imported} записей` : 'Нет новых записей для импорта');
          } catch { showToast('Ошибка: файл повреждён', true); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const handleAddEntry = (e) => {
        e.preventDefault();
        let earned = 0;
        let details = '';
        if (type === 'group') {
          earned = groupCount * GROUP_RATE;
          details = `${groupCount} чел.`;
        } else {
          earned = PERSONAL_RATE;
          details = clientName.trim() || 'Без имени';
        }
        const newEntry = {
          id: crypto.randomUUID(), date, type,
          groupCount: type === 'group' ? groupCount : null,
          clientName: type === 'personal' ? details : null,
          earned, timestamp: Date.now()
        };
        setEntries(prev => [newEntry, ...prev]);
        if (type === 'group') setGroupCount(1);
        if (type === 'personal') setClientName('');
      };

      const handleAddCharity = (e) => {
        e.preventDefault();
        const amount = parseInt(charityAmount);
        if (!charityName.trim() || !amount || amount <= 0) return;
        const newEntry = {
          id: crypto.randomUUID(),
          date,
          name: charityName.trim(),
          amount,
          timestamp: Date.now()
        };
        setCharityEntries(prev => [newEntry, ...prev]);
        setCharityAmount('');
      };

      const handleDeleteCharity = (id) => {
        if (confirmDelete === id) {
          setCharityEntries(prev => prev.filter(entry => entry.id !== id));
          setConfirmDelete(null);
        } else {
          setConfirmDelete(id);
          setTimeout(() => setConfirmDelete(null), 3000);
        }
      };

      const charityByPerson = useMemo(() => {
        const byPerson = {};
        charityEntries.forEach(entry => {
          if (!byPerson[entry.name]) byPerson[entry.name] = { total: 0, entries: [] };
          byPerson[entry.name].total += entry.amount;
          byPerson[entry.name].entries.push(entry);
        });
        return Object.entries(byPerson)
          .map(([name, data]) => ({
            name,
            total: data.total,
            entries: data.entries.sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp)
          }))
          .sort((a, b) => b.total - a.total);
      }, [charityEntries]);

      const charityTotal = useMemo(() => charityEntries.reduce((s, e) => s + e.amount, 0), [charityEntries]);

      const handleDelete = (id) => {
        if (confirmDelete === id) {
          setEntries(prev => prev.filter(entry => entry.id !== id));
          setConfirmDelete(null);
        } else {
          setConfirmDelete(id);
          setTimeout(() => setConfirmDelete(null), 3000);
        }
      };

      const todayStr = new Date().toISOString().split('T')[0];
      const currentMonthStr = todayStr.substring(0, 7);

      const stats = useMemo(() => {
        let todayTotal = 0, monthTotal = 0;
        entries.forEach(entry => {
          if (entry.date === todayStr) todayTotal += entry.earned;
          if (entry.date.startsWith(currentMonthStr)) monthTotal += entry.earned;
        });
        return { todayTotal, monthTotal };
      }, [entries, todayStr, currentMonthStr]);

      const monthlyStats = useMemo(() => {
        const mStats = {};
        entries.forEach(entry => {
          const m = entry.date.substring(0, 7);
          if (!mStats[m]) mStats[m] = { earned: 0, groupCount: 0, personalCount: 0 };
          mStats[m].earned += entry.earned;
          if (entry.type === 'group') mStats[m].groupCount += 1;
          if (entry.type === 'personal') mStats[m].personalCount += 1;
        });
        return Object.entries(mStats)
          .map(([month, data]) => ({ month, ...data }))
          .sort((a, b) => b.month.localeCompare(a.month));
      }, [entries]);

      const formatMonth = (monthStr) => {
        const [year, month] = monthStr.split('-');
        const d = new Date(year, month - 1);
        let f = d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
        return f.charAt(0).toUpperCase() + f.slice(1).replace(' г.', '');
      };

      const formatDate = (dateString) => {
        return new Date(dateString + 'T00:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
      };

      const sortedEntries = useMemo(() => {
        return [...entries].sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp);
      }, [entries]);

      return (
        <div className="min-h-screen bg-[#121212] text-white font-sans pb-0 selection:bg-orange-500/30">
          <main className="max-w-md mx-auto relative z-10 flex flex-col min-h-screen">

            {/* Dark top section */}
            <div className="px-6 pt-12 pb-6 flex-none">
              <div className="flex justify-between items-center mb-8">
                <div>
                  <p className="text-gray-400 text-sm font-medium mb-1">Привет,</p>
                  <h1 className="text-2xl font-bold flex items-center gap-2">Иннуся <span className="text-xl">👋</span></h1>
                </div>
                <div className="w-10 h-10 bg-[#1E1E1E] rounded-full flex items-center justify-center border border-gray-800 text-xl">
                  💰
                </div>
              </div>

              {/* Gradient balance card */}
              <div className="relative bg-gradient-to-br from-[#9BB0E2] via-[#E2C2B3] to-[#FCA481] rounded-[2rem] p-6 shadow-lg overflow-hidden text-gray-900 mb-6">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-[#FF8A4C] rounded-full mix-blend-overlay filter blur-3xl opacity-60"></div>
                <div className="relative z-10">
                  <div className="flex items-center gap-2 mb-1">
                    <Icon name="wallet" className="w-4 h-4 opacity-70" />
                    <p className="text-sm font-medium opacity-80">Заработано за месяц</p>
                  </div>
                  <p className="text-4xl font-bold mb-6 tracking-tight">
                    {stats.monthTotal.toLocaleString('ru-RU')} <span className="text-xl font-medium opacity-80">₴</span>
                  </p>
                  <div className="flex justify-between items-end">
                    <div>
                      <p className="text-xs font-semibold opacity-70 mb-1 uppercase tracking-wider">За сегодня</p>
                      <p className="text-lg font-bold">{stats.todayTotal.toLocaleString('ru-RU')} ₴</p>
                    </div>
                    <p className="text-xs font-bold opacity-70 bg-black/10 px-3 py-1.5 rounded-full uppercase tracking-wider">
                      {currentMonthStr.replace('-', '/')}
                    </p>
                  </div>
                </div>
              </div>

              {/* Type buttons */}
              <div className="flex gap-4">
                <button onClick={() => setType('group')}
                  className={`flex-1 py-4 px-2 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all duration-300 ${
                    type === 'group' ? 'bg-[#3B63F6] text-white shadow-[0_8px_20px_rgba(59,99,246,0.3)] scale-100' : 'bg-[#1C1C1E] text-gray-400 scale-95 opacity-80'}`}>
                  <div className={`p-2.5 rounded-2xl transition-colors ${type === 'group' ? 'bg-white/20' : 'bg-gray-800'}`}>
                    <Icon name="users" className="w-6 h-6" />
                  </div>
                  <span className="text-xs font-bold tracking-wide">Групповая</span>
                </button>
                <button onClick={() => setType('personal')}
                  className={`flex-1 py-4 px-2 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all duration-300 ${
                    type === 'personal' ? 'bg-[#FF6B35] text-white shadow-[0_8px_20px_rgba(255,107,53,0.3)] scale-100' : 'bg-[#1C1C1E] text-gray-400 scale-95 opacity-80'}`}>
                  <div className={`p-2.5 rounded-2xl transition-colors ${type === 'personal' ? 'bg-white/20' : 'bg-gray-800'}`}>
                    <Icon name="user" className="w-6 h-6" />
                  </div>
                  <span className="text-xs font-bold tracking-wide">Персональная</span>
                </button>
              </div>
            </div>

            {/* White bottom section */}
            <div className="bg-white text-gray-900 rounded-t-[2.5rem] p-6 flex-1 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex flex-col mt-2">

              {/* Add form */}
              <div className="mb-8">
                <div className="flex justify-end items-center mb-4 px-1">
                  <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
                    className="bg-gray-50 text-sm font-semibold text-gray-600 outline-none cursor-pointer py-1.5 px-3 rounded-lg border border-gray-100" required />
                </div>
                <form onSubmit={handleAddEntry} className="flex gap-3 items-end">
                  <div className="flex-1">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-2">
                      {type === 'group' ? 'Кол-во людей' : 'Имя клиента'}
                    </label>
                    {type === 'group' ? (
                      <input type="number" min="1" inputMode="numeric" value={groupCount}
                        onChange={(e) => setGroupCount(parseInt(e.target.value) || '')}
                        className="w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#3B63F6] focus:bg-white outline-none transition-all font-semibold text-gray-800"
                        placeholder="Сколько человек?" required />
                    ) : (
                      <input type="text" value={clientName} onChange={(e) => setClientName(e.target.value)}
                        className="w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#FF6B35] focus:bg-white outline-none transition-all font-semibold text-gray-800"
                        placeholder="Например: Анна" required />
                    )}
                  </div>
                  <button type="submit"
                    className={`h-[52px] px-5 rounded-2xl text-white font-bold transition-all active:scale-95 shadow-md flex items-center justify-center whitespace-nowrap ${
                      type === 'group' ? 'bg-[#3B63F6] shadow-blue-500/20' : 'bg-[#FF6B35] shadow-orange-500/20'}`}>
                    +{type === 'group' ? (groupCount || 0) * GROUP_RATE : PERSONAL_RATE} ₴
                  </button>
                </form>
              </div>

              {/* Tabs */}
              <div className="flex bg-gray-100/80 p-1 rounded-2xl mb-5">
                {['history', 'stats', 'charity', 'backup'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)}
                    className={`flex-1 py-2 text-[13px] font-bold rounded-xl transition-all ${
                      activeTab === tab ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400'}`}>
                    {{history: 'История', stats: 'Стат.', charity: '❤️ Помощь', backup: 'Копия'}[tab]}
                  </button>
                ))}
              </div>

              {/* Tab content */}
              <div className="flex-1 pb-6">
                {activeTab === 'history' && (
                  sortedEntries.length === 0 ? (
                    <div className="text-center py-8">
                      <p className="text-gray-400 font-medium text-sm">Здесь будет список тренировок</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {sortedEntries.map((entry) => (
                        <div key={entry.id} className="flex items-center justify-between group">
                          <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 rounded-[1.25rem] flex items-center justify-center ${
                              entry.type === 'group' ? 'bg-[#EEF2FF] text-[#3B63F6]' : 'bg-[#FFF0ED] text-[#FF6B35]'}`}>
                              <Icon name={entry.type === 'group' ? 'users' : 'user'} className="w-5 h-5" />
                            </div>
                            <div>
                              <h3 className="font-bold text-gray-900 text-[15px]">
                                {entry.type === 'group' ? 'Групповая' : entry.clientName}
                              </h3>
                              <p className="text-xs text-gray-400 font-medium mt-0.5">
                                {entry.type === 'group' ? `${entry.groupCount} человек` : 'Персональная'} · {formatDate(entry.date)}
                              </p>
                            </div>
                          </div>
                          <div className="flex items-center gap-3">
                            <span className="font-bold text-gray-900">{entry.earned} ₴</span>
                            <button onClick={() => handleDelete(entry.id)}
                              className={`p-1.5 rounded-lg transition-colors ${
                                confirmDelete === entry.id ? 'text-red-600 bg-red-50' : 'text-gray-300 active:text-red-500 active:bg-red-50'}`}>
                              <Icon name="trash-2" className="w-4 h-4" />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )
                )}

                {activeTab === 'stats' && (
                  monthlyStats.length === 0 ? (
                    <div className="text-center py-8">
                      <p className="text-gray-400 font-medium text-sm">Пока нет данных для статистики</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {monthlyStats.map((stat) => {
                        const isOpen = expandedMonth === stat.month;
                        const monthEntries = isOpen ? entries
                          .filter(e => e.date.startsWith(stat.month))
                          .sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp) : [];
                        return (
                          <div key={stat.month}>
                            <button onClick={() => setExpandedMonth(isOpen ? null : stat.month)}
                              className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
                                isOpen ? 'bg-white border-gray-200 shadow-sm' : 'bg-gray-50 border-gray-100'}`}>
                              <div className="flex items-center gap-4">
                                <div className={`w-12 h-12 rounded-[1.25rem] flex items-center justify-center ${
                                  isOpen ? 'bg-[#3B63F6] text-white' : 'bg-gray-200/50 text-gray-500'}`}>
                                  <Icon name="calendar" className="w-5 h-5" />
                                </div>
                                <div className="text-left">
                                  <h3 className="font-bold text-gray-900 text-[15px]">{formatMonth(stat.month)}</h3>
                                  <p className="text-xs text-gray-500 font-medium mt-0.5">
                                    {stat.groupCount} групп. · {stat.personalCount} перс.
                                  </p>
                                </div>
                              </div>
                              <div className="flex items-center gap-2">
                                <span className="font-bold text-gray-900 text-[15px]">{stat.earned.toLocaleString('ru-RU')} ₴</span>
                                <span className={`text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}>▾</span>
                              </div>
                            </button>
                            {isOpen && (
                              <div className="mt-2 ml-4 mr-1 space-y-3 fade-in">
                                {monthEntries.map((entry) => (
                                  <div key={entry.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                                    <div className="flex items-center gap-3">
                                      <div className={`w-9 h-9 rounded-xl flex items-center justify-center ${
                                        entry.type === 'group' ? 'bg-[#EEF2FF] text-[#3B63F6]' : 'bg-[#FFF0ED] text-[#FF6B35]'}`}>
                                        <Icon name={entry.type === 'group' ? 'users' : 'user'} className="w-4 h-4" />
                                      </div>
                                      <div>
                                        <p className="font-semibold text-gray-800 text-sm">
                                          {entry.type === 'group' ? `Групповая · ${entry.groupCount} чел.` : entry.clientName}
                                        </p>
                                        <p className="text-[11px] text-gray-400">{formatDate(entry.date)}</p>
                                      </div>
                                    </div>
                                    <span className="font-bold text-gray-700 text-sm">{entry.earned} ₴</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )
                )}

                {activeTab === 'charity' && (
                  <div className="space-y-5">
                    {/* Add charity form */}
                    <form onSubmit={handleAddCharity} className="space-y-3">
                      <div className="flex gap-3">
                        <input type="text" value={charityName} onChange={(e) => setCharityName(e.target.value)}
                          className="flex-1 px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-pink-400 focus:bg-white outline-none transition-all font-semibold text-gray-800 text-sm"
                          placeholder="Имя (напр. Мама)" required />
                        <input type="number" inputMode="numeric" value={charityAmount} onChange={(e) => setCharityAmount(e.target.value)}
                          className="w-28 px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-pink-400 focus:bg-white outline-none transition-all font-semibold text-gray-800 text-sm"
                          placeholder="Сумма ₴" min="1" required />
                      </div>
                      <button type="submit"
                        className="w-full py-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold rounded-2xl transition-all active:scale-[0.97] shadow-md shadow-pink-500/20 text-sm">
                        ❤️ Записать помощь
                      </button>
                    </form>

                    {/* Total */}
                    {charityTotal > 0 && (
                      <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-2xl p-4 border border-pink-100">
                        <p className="text-xs font-bold text-pink-400 uppercase tracking-wider mb-1">Всего помощь</p>
                        <p className="text-2xl font-bold text-gray-900">{charityTotal.toLocaleString('ru-RU')} ₴</p>
                      </div>
                    )}

                    {/* By person */}
                    {charityByPerson.length > 0 && (
                      <div className="space-y-3">
                        {charityByPerson.map(person => {
                          const isOpen = expandedPerson === person.name;
                          return (
                            <div key={person.name}>
                              <button onClick={() => setExpandedPerson(isOpen ? null : person.name)}
                                className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
                                  isOpen ? 'bg-white border-pink-200 shadow-sm' : 'bg-gray-50 border-gray-100'}`}>
                                <div className="flex items-center gap-3">
                                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${
                                    isOpen ? 'bg-pink-500 text-white' : 'bg-pink-50 text-pink-400'}`}>
                                    ❤️
                                  </div>
                                  <div className="text-left">
                                    <h3 className="font-bold text-gray-900 text-[15px]">{person.name}</h3>
                                    <p className="text-xs text-gray-400 font-medium">{person.entries.length} записей</p>
                                  </div>
                                </div>
                                <div className="flex items-center gap-2">
                                  <span className="font-bold text-gray-900">{person.total.toLocaleString('ru-RU')} ₴</span>
                                  <span className={`text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}>▾</span>
                                </div>
                              </button>
                              {isOpen && (
                                <div className="mt-2 ml-4 mr-1 space-y-2 fade-in">
                                  {person.entries.map(entry => (
                                    <div key={entry.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                                      <div>
                                        <p className="font-semibold text-gray-700 text-sm">{entry.amount.toLocaleString('ru-RU')} ₴</p>
                                        <p className="text-[11px] text-gray-400">{formatDate(entry.date)}</p>
                                      </div>
                                      <button onClick={() => handleDeleteCharity(entry.id)}
                                        className={`p-1.5 rounded-lg transition-colors ${
                                          confirmDelete === entry.id ? 'text-red-600 bg-red-50' : 'text-gray-300 active:text-red-500 active:bg-red-50'}`}>
                                        <Icon name="trash-2" className="w-4 h-4" />
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}

                {activeTab === 'backup' && (
                  <div className="space-y-4">
                    <div className="bg-gray-50 rounded-2xl p-5 border border-gray-100">
                      <div className="flex items-center gap-2 mb-2">
                        <Icon name="shield" className="w-5 h-5 text-green-600" />
                        <h3 className="font-bold text-gray-900">Резервная копия</h3>
                      </div>
                      <p className="text-xs text-gray-400 mb-4">Сохраняйте копию в файл перед обновлением телефона. Импорт добавит только новые записи.</p>
                      <div className="grid grid-cols-2 gap-3">
                        <button onClick={handleExport} disabled={entries.length === 0}
                          className="flex items-center justify-center gap-2 py-3 px-4 bg-green-600 text-white font-semibold rounded-xl text-sm transition-all active:scale-[0.97] disabled:opacity-30">
                          <Icon name="download" className="w-4 h-4" />
                          Сохранить
                        </button>
                        <button onClick={() => fileInputRef.current?.click()}
                          className="flex items-center justify-center gap-2 py-3 px-4 bg-gray-200 text-gray-700 font-semibold rounded-xl text-sm transition-all active:scale-[0.97]">
                          <Icon name="upload" className="w-4 h-4" />
                          Загрузить
                        </button>
                      </div>
                      <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
                    </div>
                    <p className="text-[11px] text-gray-300 text-center px-4">
                      Тренировки: {entries.length} · Помощь: {charityEntries.length}
                    </p>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Toast */}
          {toast && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl shadow-lg text-sm font-medium z-50 fade-in ${
              toast.isError ? 'bg-red-600 text-white' : 'bg-gray-900 text-white'}`}>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
