<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Тренировки">
  <meta name="theme-color" content="#0f0f0f">
  <title>Мои Тренировки</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    input[type="date"]::-webkit-date-and-time-value { text-align: left; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    html { overscroll-behavior-y: contain; }
    .header-gradient {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }
    .header-gradient::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(232,126,50,0.4) 0%, rgba(232,126,50,0.1) 40%, transparent 70%);
      top: -40px;
      right: -40px;
      border-radius: 50%;
    }
    .header-gradient::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(232,126,50,0.2) 0%, transparent 70%);
      bottom: -30px;
      left: 30%;
      border-radius: 50%;
    }
    .btn-orange {
      background: linear-gradient(135deg, #e87e32 0%, #f4a261 100%);
    }
    .btn-orange:active {
      background: linear-gradient(135deg, #d06a20 0%, #e09050 100%);
    }
    .card-dark {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  </style>
</head>
<body class="bg-neutral-50 text-slate-800">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // SVG Icon components using Lucide paths
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        'trending-up': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
        'clock': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        'wallet': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
        'plus-circle': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>,
        'calendar': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>,
        'users': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        'user': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        'trash-2': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
        'download': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
        'upload': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
        'shield': <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>,
      };
      return icons[name] || null;
    };

    const STORAGE_KEY = 'training-tracker-entries';
    const GROUP_RATE = 150;
    const PERSONAL_RATE = 600;

    // Load from localStorage
    function loadEntries() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    // Save to localStorage
    function saveEntries(entries) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      } catch (e) {
        console.error('Failed to save:', e);
      }
    }

    function App() {
      const [entries, setEntries] = useState(loadEntries);
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [type, setType] = useState('group');
      const [groupCount, setGroupCount] = useState(1);
      const [clientName, setClientName] = useState('');
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [toast, setToast] = useState(null);
      const fileInputRef = React.useRef(null);

      // Request persistent storage on mount
      useEffect(() => {
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist();
        }
      }, []);

      // Save whenever entries change
      useEffect(() => {
        saveEntries(entries);
      }, [entries]);

      const showToast = (msg, isError) => {
        setToast({ msg, isError });
        setTimeout(() => setToast(null), 3000);
      };

      // Export data as JSON file
      const handleExport = () => {
        const data = JSON.stringify(entries, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `trenirovki-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Данные экспортированы');
      };

      // Import data from JSON file
      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error('not array');
            // Merge: add entries that don't already exist by id
            setEntries(prev => {
              const existingIds = new Set(prev.map(e => e.id));
              const newOnes = data.filter(e => e.id && !existingIds.has(e.id));
              if (newOnes.length === 0) {
                showToast('Нет новых записей для импорта');
                return prev;
              }
              showToast(`Импортировано ${newOnes.length} записей`);
              return [...newOnes, ...prev];
            });
          } catch {
            showToast('Ошибка: файл повреждён', true);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const handleAddEntry = (e) => {
        e.preventDefault();
        let earned = 0;
        let details = '';
        if (type === 'group') {
          earned = groupCount * GROUP_RATE;
          details = `${groupCount} чел.`;
        } else {
          earned = PERSONAL_RATE;
          details = clientName.trim() || 'Без имени';
        }
        const newEntry = {
          id: crypto.randomUUID(),
          date,
          type,
          groupCount: type === 'group' ? groupCount : null,
          clientName: type === 'personal' ? details : null,
          earned,
          timestamp: Date.now()
        };
        setEntries(prev => [newEntry, ...prev]);
        if (type === 'group') setGroupCount(1);
        if (type === 'personal') setClientName('');
      };

      const handleDelete = (id) => {
        if (confirmDelete === id) {
          setEntries(prev => prev.filter(entry => entry.id !== id));
          setConfirmDelete(null);
        } else {
          setConfirmDelete(id);
          setTimeout(() => setConfirmDelete(null), 3000);
        }
      };

      const todayStr = new Date().toISOString().split('T')[0];
      const currentMonthStr = todayStr.substring(0, 7);

      const stats = useMemo(() => {
        let todayTotal = 0;
        let monthTotal = 0;
        entries.forEach(entry => {
          if (entry.date === todayStr) todayTotal += entry.earned;
          if (entry.date.startsWith(currentMonthStr)) monthTotal += entry.earned;
        });
        return { todayTotal, monthTotal };
      }, [entries, todayStr, currentMonthStr]);

      const formatDate = (dateString) => {
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        return new Date(dateString + 'T00:00:00').toLocaleDateString('ru-RU', options);
      };

      const sortedEntries = useMemo(() => {
        return [...entries].sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp);
      }, [entries]);

      return (
        <div className="min-h-screen bg-neutral-50 text-slate-800 pb-10">
          {/* Header */}
          <header className="header-gradient text-white p-6 pb-12 rounded-b-3xl shadow-lg">
            <div className="max-w-md mx-auto relative z-10">
              <h1 className="text-2xl font-extrabold flex items-center gap-2 tracking-tight">
                <Icon name="trending-up" className="w-6 h-6 text-orange-400" />
                Мои Тренировки
              </h1>
              <p className="text-slate-400 text-sm mt-1">Учет доходов и клиентов</p>
            </div>
          </header>

          <main className="max-w-md mx-auto px-4 -mt-6 relative z-10 space-y-5">
            {/* Stats */}
            <div className="grid grid-cols-2 gap-3">
              <div className="card-dark rounded-2xl p-4 shadow-lg flex flex-col items-center text-center">
                <div className="bg-orange-500/20 p-2 rounded-full mb-2">
                  <Icon name="clock" className="w-5 h-5 text-orange-400" />
                </div>
                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-1">За сегодня</p>
                <p className="text-xl font-extrabold text-white">{stats.todayTotal.toLocaleString('ru-RU')} <span className="text-xs font-medium text-slate-500">грн</span></p>
              </div>
              <div className="card-dark rounded-2xl p-4 shadow-lg flex flex-col items-center text-center">
                <div className="bg-orange-500/20 p-2 rounded-full mb-2">
                  <Icon name="wallet" className="w-5 h-5 text-orange-400" />
                </div>
                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-1">В этом месяце</p>
                <p className="text-xl font-extrabold text-white">{stats.monthTotal.toLocaleString('ru-RU')} <span className="text-xs font-medium text-slate-500">грн</span></p>
              </div>
            </div>

            {/* Form */}
            <div className="bg-white rounded-3xl p-6 shadow-sm border border-neutral-100">
              <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                <Icon name="plus-circle" className="w-5 h-5 text-orange-500" />
                Добавить тренировку
              </h2>
              <form onSubmit={handleAddEntry} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-500 mb-1">Дата</label>
                  <div className="relative">
                    <Icon name="calendar" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                    <input
                      type="date"
                      value={date}
                      onChange={(e) => setDate(e.target.value)}
                      className="w-full pl-10 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none transition text-base"
                      required
                    />
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2 p-1 bg-neutral-100 rounded-xl">
                  <button type="button" onClick={() => setType('group')}
                    className={`py-2.5 px-4 rounded-lg text-sm font-semibold transition-all ${type === 'group' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400'}`}>
                    Групповая
                  </button>
                  <button type="button" onClick={() => setType('personal')}
                    className={`py-2.5 px-4 rounded-lg text-sm font-semibold transition-all ${type === 'personal' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400'}`}>
                    Персональная
                  </button>
                </div>

                {type === 'group' ? (
                  <div className="fade-in">
                    <label className="block text-sm font-medium text-slate-500 mb-1">Количество людей (по 150 грн)</label>
                    <div className="relative">
                      <Icon name="users" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                      <input
                        type="number"
                        min="1"
                        inputMode="numeric"
                        value={groupCount}
                        onChange={(e) => setGroupCount(parseInt(e.target.value) || '')}
                        className="w-full pl-10 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none transition text-base"
                        placeholder="Сколько пришло человек?"
                        required
                      />
                    </div>
                  </div>
                ) : (
                  <div className="fade-in">
                    <label className="block text-sm font-medium text-slate-500 mb-1">Имя клиента (600 грн)</label>
                    <div className="relative">
                      <Icon name="user" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                      <input
                        type="text"
                        value={clientName}
                        onChange={(e) => setClientName(e.target.value)}
                        className="w-full pl-10 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none transition text-base"
                        placeholder="Например: Анна С."
                        required
                      />
                    </div>
                  </div>
                )}

                <button type="submit"
                  className="w-full btn-orange text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-[0.98]">
                  Сохранить ({type === 'group' ? (groupCount || 0) * GROUP_RATE : PERSONAL_RATE} грн)
                </button>
              </form>
            </div>

            {/* History */}
            <div>
              <h2 className="text-lg font-bold mb-4 px-2 text-slate-700">История тренировок</h2>
              {sortedEntries.length === 0 ? (
                <div className="text-center py-10 px-4 bg-white rounded-3xl border border-neutral-100 border-dashed">
                  <div className="bg-neutral-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                    <Icon name="calendar" className="w-8 h-8 text-neutral-300" />
                  </div>
                  <p className="text-slate-400 font-medium">Пока нет записей</p>
                  <p className="text-sm text-slate-300 mt-1">Добавьте первую тренировку выше</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {sortedEntries.map((entry) => (
                    <div key={entry.id} className="bg-white p-4 rounded-2xl shadow-sm border border-neutral-100 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className={`p-3 rounded-full flex-shrink-0 ${entry.type === 'group' ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600'}`}>
                          <Icon name={entry.type === 'group' ? 'users' : 'user'} className="w-5 h-5" />
                        </div>
                        <div className="min-w-0">
                          <h3 className="font-bold text-slate-800 text-sm">
                            {entry.type === 'group' ? 'Групповая' : 'Персональная'}
                          </h3>
                          <div className="flex flex-col text-xs text-slate-400 mt-0.5">
                            <span className="flex items-center gap-1">
                              <Icon name="calendar" className="w-3 h-3" />
                              {formatDate(entry.date)}
                            </span>
                            <span className="font-medium text-slate-600">
                              {entry.type === 'group' ? `${entry.groupCount} чел.` : entry.clientName}
                            </span>
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2 flex-shrink-0">
                        <div className="text-right">
                          <span className="block font-bold text-orange-500 text-sm">+{entry.earned.toLocaleString('ru-RU')}</span>
                          <span className="block text-xs text-slate-400">грн</span>
                        </div>
                        <button
                          onClick={() => handleDelete(entry.id)}
                          className={`p-2 rounded-lg transition-colors ${confirmDelete === entry.id ? 'text-red-600 bg-red-50' : 'text-slate-300 hover:text-red-500 hover:bg-red-50'}`}
                          title={confirmDelete === entry.id ? 'Нажмите еще раз для удаления' : 'Удалить запись'}
                        >
                          <Icon name="trash-2" className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {/* Backup / Restore */}
            <div className="card-dark rounded-3xl p-5 shadow-lg">
              <h2 className="text-base font-bold mb-3 flex items-center gap-2 text-white">
                <Icon name="shield" className="w-5 h-5 text-orange-400" />
                Резервная копия
              </h2>
              <p className="text-xs text-slate-400 mb-4">Сохраняйте копию данных в файл, чтобы не потерять при обновлении телефона</p>
              <div className="grid grid-cols-2 gap-3">
                <button onClick={handleExport} disabled={entries.length === 0}
                  className="flex items-center justify-center gap-2 py-3 px-4 bg-white/10 text-orange-300 font-semibold rounded-xl text-sm transition-all active:scale-[0.97] active:bg-white/20 disabled:opacity-30">
                  <Icon name="download" className="w-4 h-4" />
                  Сохранить
                </button>
                <button onClick={() => fileInputRef.current?.click()}
                  className="flex items-center justify-center gap-2 py-3 px-4 bg-white/10 text-slate-300 font-semibold rounded-xl text-sm transition-all active:scale-[0.97] active:bg-white/20">
                  <Icon name="upload" className="w-4 h-4" />
                  Загрузить
                </button>
              </div>
              <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
            </div>

          </main>

          {/* Toast */}
          {toast && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl shadow-lg text-sm font-medium z-50 fade-in ${toast.isError ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    // Register Service Worker for offline support & PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
